<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="saree" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#92400e"/>
    </linearGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>
  <!-- Decorative pattern -->
  <g opacity="0.08">
    <circle cx="300" cy="400" r="250" fill="none" stroke="#92400e" stroke-width="1"/>
    <circle cx="300" cy="400" r="200" fill="none" stroke="#92400e" stroke-width="1"/>
    <circle cx="300" cy="400" r="150" fill="none" stroke="#92400e" stroke-width="1"/>
    <line x1="50" y1="400" x2="550" y2="400" stroke="#92400e" stroke-width="0.5"/>
    <line x1="300" y1="150" x2="300" y2="650" stroke="#92400e" stroke-width="0.5"/>
  </g>
  <!-- Saree icon -->
  <g transform="translate(300, 370)">
    <path d="M-60,-80 C-60,-80 -40,-120 0,-120 C40,-120 60,-80 60,-80 L80,80 C80,80 40,100 0,100 C-40,100 -80,80 -80,80 Z" fill="url(#saree)" opacity="0.3"/>
    <path d="M-40,-60 C-40,-60 -20,-90 0,-90 C20,-90 40,-60 40,-60 L55,60 C55,60 30,75 0,75 C-30,75 -55,60 -55,60 Z" fill="url(#saree)" opacity="0.5"/>
    <!-- Fold lines -->
    <line x1="-20" y1="-50" x2="-30" y2="50" stroke="#fef3c7" stroke-width="1" opacity="0.4"/>
    <line x1="10" y1="-60" x2="5" y2="55" stroke="#fef3c7" stroke-width="1" opacity="0.4"/>
    <line x1="30" y1="-45" x2="35" y2="45" stroke="#fef3c7" stroke-width="1" opacity="0.4"/>
  </g>
  <!-- Text -->
  <text x="300" y="520" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#92400e" opacity="0.5">Silk &amp; Grace</text>
  <text x="300" y="545" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#b45309" opacity="0.4">Premium Saree</text>
</svg>
